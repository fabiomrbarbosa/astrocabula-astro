<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
	<!-- App icon master: astrological Sun glyph on the site's paper tone.
	     Glyph stays inside the central 80% so the same art works as a
	     maskable icon. PNGs in this directory are rendered from this file
	     (qlmanage -t -s 1024, then sips -z to each size). -->
	<rect width="512" height="512" fill="#f0ebe2" />
	<circle cx="256" cy="256" r="118" fill="none" stroke="#2b2622" stroke-width="24" />
	<circle cx="256" cy="256" r="36" fill="#2b2622" />
</svg>
